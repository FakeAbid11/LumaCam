name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name to stamp (e.g. 1.2.0). Defaults to the tag."
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build signed release (AAB + APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Cache Gradle
        uses: gradle/gradle-build-action@v3

      - name: Verify signing secrets are configured
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Release signing secrets are not configured. Add KEYSTORE_BASE64, STORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD before releasing."
            exit 1
          fi

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Resolve version name
        id: ver
        run: |
          INPUT="${{ github.event.inputs.version_name }}"
          if [ -n "$INPUT" ]; then
            echo "name=$INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed AAB + APK
        run: ./gradlew bundleRelease assembleRelease
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.ver.outputs.name }}

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumaCam-signed-release-${{ steps.ver.outputs.name }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 14
